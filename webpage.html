<!DOCTYPE html>
<style>
    head, body{
        font-family: 'Raleway', sans-serif;
        background-color: #1f1d1d;
        color: wheat;
        background-image: url("src/noaa-cthDc0hUM0o-unsplash.jpg");
        background-size: cover;
        background-position: center;
    }
    .heading{
        display: flex;
        flex-direction: row;
    }
    .headimage{
        width: 500px;
    }
    .about{
        margin-left: 900px;
        margin-top: 50px;
        font-size: x-large;
    }
    .search{
       display: flex;
       flex-direction: row;
       justify-content: center;
       align-items: center;
       height: 50vh;
    }
    .searchbar{
        height: 70px;
        width: 600px;
        font-size: xx-large;
    }
    .searchbutton{
        background-image: url("src/icons8-search-more-60.png");
        height: 75px;
        width: 70px;
        margin-left: 5px;
        background-size: contain;
    }
    .searchbutton:hover{
        background-image: url("src/icons8-search-more-50.png");
        height: 75px;
        width: 70px;
        transition-delay: 0.1s;
    }
</style>
<html>
    <head>
        <title>Weather Today</title>
        <link href="https://fonts.googleapis.com/css?family=Raleway:200,100,400" rel="stylesheet" type="text/css" />
    </head>
    <body>
        <div class="heading">
            <h1>
                <img class="headimage" src="src/logo-no-background.png">
            </h1>
            <p class="about">About</p>
        </div>
        <div class="search">
            <input type="text" class="searchbar" id="search" placeholder="Search for a place...">
            <button class="searchbutton"></button>
        </div>
    </body>
    <footer>
        <p>This page was built using Java.</p>
    </footer>
</html>
